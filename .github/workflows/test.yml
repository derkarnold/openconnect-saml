name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # so release.yml / publish.yml can re-use this matrix as a gate

# Allow the comment-pytest-output debug step to write a PR comment.
permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        shell: bash
        run: |
          set -o pipefail
          pytest -v --cov=openconnect_saml --cov-report=xml --cov-report=term-missing 2>&1 | tee pytest-output.txt
      - name: Comment pytest output on PR (debug)
        if: failure() && github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "### pytest tail — ${{ matrix.os }} / ${{ matrix.python-version }}"
            echo ""
            echo '```'
            tail -200 pytest-output.txt
            echo '```'
          } > /tmp/comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/comment.md \
            --repo "${{ github.repository }}"
      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
