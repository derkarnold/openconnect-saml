name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # so release.yml / publish.yml can re-use this matrix as a gate

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        # ``set -o pipefail`` + ``tee`` is portable across bash and
        # Git Bash on Windows. Without the file capture the Windows
        # runner ends up writing pytest/coverage's UTF-8 output
        # straight into the GitHub Actions log stream, which has
        # historically tripped cp1252 encoding errors during the
        # coverage report. Routing it through a UTF-8 pipe avoids
        # that and is also useful for debugging when CI does fail.
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: |
          set -o pipefail
          pytest -v --cov=openconnect_saml --cov-report=xml --cov-report=term-missing 2>&1 | tee pytest-output.txt
      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
