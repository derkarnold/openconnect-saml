name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  # Manual trigger lets us validate pipeline changes (action bumps,
  # script edits) on a branch *before* a real tag goes out. The
  # actual PyPI upload is gated on a real tag context, so a manual
  # run builds + uploads the artifact between jobs but never pushes
  # to PyPI.
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  tests:
    # Re-run the full test matrix on the tagged commit. PyPI only sees
    # builds where every job here was green — including the Windows runner.
    name: Tests (gate)
    uses: ./.github/workflows/test.yml

  build:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    # Only fire on a real tag push, never on workflow_dispatch.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/openconnect-saml
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # Smoke-only download-artifact exerciser for non-tag runs (manual
  # workflow_dispatch + the temporary branch-test trigger). Validates
  # the upload→download round-trip without actually pushing to PyPI.
  # On a real tag push this job is skipped — the publish job
  # already exercises download-artifact for real.
  artifact-roundtrip-check:
    name: Artifact round-trip (non-tag runs)
    needs: build
    if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: List downloaded files
        run: ls -la dist/
