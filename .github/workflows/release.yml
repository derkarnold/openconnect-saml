name: Release

on:
  push:
    tags:
      - "v*"
  # Manual trigger lets us validate pipeline changes (action bumps,
  # script edits) on a branch *before* a real tag goes out. The
  # publish-y steps (GitHub Release, AUR trigger) are gated on a
  # real tag context, so a manual run on a branch builds the
  # artifacts and exercises the actions without shipping anything.
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  tests:
    # Re-run the full test matrix on the tagged commit. Releases only ship
    # if every job here is green — including the Windows runner.
    name: Tests (gate)
    uses: ./.github/workflows/test.yml

  build:
    name: Build package
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    name: Create GitHub Release
    needs: build
    # Only fire on a real tag push, never on workflow_dispatch.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Try to extract changelog section; fall back to tag name
          if [ -f CHANGELOG.md ]; then
            NOTES=$(sed -n "/^## .*${VERSION}/,/^## /p" CHANGELOG.md | sed '$d')
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
          generate_release_notes: true

  # Smoke-only download-artifact exerciser for non-tag runs (manual
  # workflow_dispatch + the temporary branch-test trigger). Validates
  # the upload→download round-trip without firing github-release or
  # trigger-aur. On a real tag push this job is skipped — the
  # github-release job already exercises download-artifact for real.
  artifact-roundtrip-check:
    name: Artifact round-trip (non-tag runs)
    needs: build
    if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: List downloaded files
        run: ls -la dist/

  trigger-aur:
    name: Trigger AUR update
    needs: github-release
    # Only fire on a real tag push, never on workflow_dispatch.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AUR publish workflow
        uses: peter-evans/repository-dispatch@v4
        with:
          event-type: aur-publish
