site_name: openconnect-saml
site_description: OpenConnect wrapper with Azure AD (SAML) SSO support for Cisco SSL-VPNs
site_url: https://mschabhuettl.github.io/openconnect-saml/
repo_url: https://github.com/mschabhuettl/openconnect-saml
repo_name: mschabhuettl/openconnect-saml
edit_uri: edit/main/docs/

# The existing markdown lives in docs/ and was written hand-formatted
# for plain GitHub rendering. This config layers a navigable site on
# top of it without rewriting any of the content.
docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

# Mirrors the table-of-contents in docs/README.md.
nav:
  - Home: README.md
  - Installation: installation.md
  - Authentication: authentication.md
  - Browsers: browsers.md
  - Profiles: profiles.md
  - Networking: networking.md
  - Operations: operations.md
  - Configuration: configuration.md
  - Diagnostics: diagnostics.md
  - CLI Reference: cli-reference.md
  - Migration: migration.md
  - Development: development.md
